<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Portfolio</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
margin:0;
background:white;
color:black;
}

header{
text-align:center;
padding:60px;
border-bottom:1px solid black;
}

nav{
text-align:center;
padding:20px;
border-bottom:1px solid black;
}

nav a{
margin:0 15px;
text-decoration:none;
color:black;
font-weight:bold;
}

section{
max-width:1200px;
margin:auto;
padding:40px 15px;
}

h2{
border-bottom:1px solid black;
padding-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:0;
margin-top:10px;
align-items:start;
}

.grid img{
width:100%;
height:auto;
cursor:pointer;
transition:0.2s;
display:block;
}

.grid img:hover{
transform:scale(1.03);
}

iframe{
width:100%;
height:300px;
}

footer{
text-align:center;
padding:30px;
border-top:1px solid black;
}
  
#lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
z-index:1000;
}

#lightbox img,
#lightbox iframe{
max-width:90vw;
max-height:90vh;
}

#lightbox iframe{
display:none;
width:80vw;
height:45vw;
}

#prev,#next{
position:absolute;
top:50%;
font-size:40px;
color:white;
cursor:pointer;
padding:20px;
user-select:none;
}

#prev{left:20px;}
#next{right:20px;}


</style>

</head>

<body>

<header>

<h1>Pedro P. Kap</h1>
<p>Diseño de Imagen y Sonido - UBA</p>

</header>

<nav>

<a href="#fotografias">Fotografías</a>
<a href="#disenos">Diseños</a>
<a href="#audiovisuales">Audiovisuales</a>
<a href="#sobre">Sobre Mí</a>

</nav>

<section id="fotografias">

<h2>Fotografías</h2>

<div class="grid">

<img src="images/foto1.jpg" data-gallery="foto" onclick="openImage(this)">
<img src="images/foto2.jpg" data-gallery="foto" onclick="openImage(this)">
<img src="images/foto3.jpg" data-gallery="foto" onclick="openImage(this)">
<img src="images/foto4.jpg" data-gallery="foto" onclick="openImage(this)">

</div>

</section>

<section id="disenos">

<h2>Diseños</h2>

<div class="grid">

<img src="images/diseno1.jpg" data-gallery="diseno" onclick="openImage(this)">
<img src="images/diseno2.jpg" data-gallery="diseno" onclick="openImage(this)">

</div>

</section>

<section id="audiovisuales">

<h2>Audiovisuales</h2>

<div class="grid">

<iframe src="https://www.youtube.com/embed/VIDEOID"></iframe>

<iframe src="https://www.youtube.com/embed/VIDEOID"></iframe>

</div>

</section>
  
<section id="sobre">

<h2>Sobre Mí</h2>

<p>
Escribí aquí tu descripción: quién sos, qué hacés, formación o proyectos.
</p>

</section>

<footer>

© Pedro P. Kap

</footer>

<script>

let gallery=[];
let currentIndex=0;
let currentGallery="";

function openImage(img){

currentGallery=img.dataset.gallery;

gallery=[...document.querySelectorAll(`img[data-gallery="${currentGallery}"]`)]
.map(i=>i.src);

currentIndex=gallery.indexOf(img.src);

document.getElementById("lightbox").style.display="flex";
document.getElementById("lightbox-img").src=gallery[currentIndex];

}

function nextImage(){

currentIndex=(currentIndex+1)%gallery.length;
document.getElementById("lightbox-img").src=gallery[currentIndex];

}

function prevImage(){

currentIndex=(currentIndex-1+gallery.length)%gallery.length;
document.getElementById("lightbox-img").src=gallery[currentIndex];

}

function closeImage(){
document.getElementById("lightbox").style.display="none";
}

document.addEventListener("keydown",function(e){

if(e.key==="Escape"){
closeImage();
}

if(e.key==="ArrowRight"){
nextImage();
}

if(e.key==="ArrowLeft"){
prevImage();
}

});

</script>

<div id="lightbox" onclick="closeImage()">

<span id="prev" onclick="event.stopPropagation(); prevImage()">❮</span>

<img id="lightbox-img">

<iframe id="lightbox-video" frameborder="0" allowfullscreen></iframe>

<span id="next" onclick="event.stopPropagation(); nextImage()">❯</span>

</div>

</body>
</html>
