<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Portfolio</title>

<style>
#lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
cursor:pointer;
}

#lightbox img{
max-width:90vw;
max-height:90vh;
width:auto;
height:auto;
object-fit:contain;
}

body{
font-family: Arial, Helvetica, sans-serif;
margin:0;
background:white;
color:black;
}

header{
text-align:center;
padding:60px;
border-bottom:1px solid black;
}

nav{
text-align:center;
padding:20px;
border-bottom:1px solid black;
}

nav a{
margin:0 15px;
text-decoration:none;
color:black;
font-weight:bold;
}

section{
max-width:900px;
margin:50px;
padding:60px 20px;
}

h2{
border-bottom:1px solid black;
padding-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:12px;
margin-top:20px;
}

.grid img{
width:100%;
height:250px;
object-fit:cover;
cursor:pointer;
filter:grayscale(100%);
transition:0.2s;
}

.grid img:hover{
filter:grayscale(0%);
transform:scale(1.02);
}

img{
width:100%;
}

iframe{
width:100%;
height:300px;
}

footer{
text-align:center;
padding:30px;
border-top:1px solid black;
}

</style>

</head>

<body>

<header>

<h1>Pedro P. Kap</h1>
<p>Portfolio</p>

</header>

<nav>

<a href="#sobre">Sobre Mí</a>
<a href="#fotografias">Fotografías</a>
<a href="#disenos">Diseños</a>
<a href="#audiovisuales">Audiovisuales</a>

</nav>

<section id="sobre">

<h2>Sobre Mí</h2>

<p>
Escribí aquí tu descripción: quién sos, qué hacés, formación o proyectos.
</p>

</section>

<section id="fotografias">

<h2>Fotografías</h2>

<div class="grid">

<img src="images/foto1.jpg" onclick="openImage(this)">
<img src="images/foto2.jpg" onclick="openImage(this)">
<img src="images/foto3.jpg" onclick="openImage(this)">

</div>

</section>

<section id="disenos">

<h2>Diseños</h2>

<div class="grid">

<img src="images/diseno1.jpg" onclick="openImage(this)">
<img src="images/diseno2.jpg" onclick="openImage(this)">

</div>

</section>

<section id="audiovisuales">

<h2>Audiovisuales</h2>

<div class="grid">

<iframe src="https://www.youtube.com/embed/VIDEOID"></iframe>
  
<iframe src="https://www.youtube.com/embed/VIDEOID"></iframe>

</div>

</section>

<footer>

© Pedro P. Kap

</footer>

<div id="lightbox" onclick="closeImage()">
<img id="lightbox-img">
</div>

<script>

function openImage(img){

document.getElementById("lightbox").style.display="flex";
document.getElementById("lightbox-img").src=img.src;

}

function closeImage(){

document.getElementById("lightbox").style.display="none";

}

document.addEventListener("keydown",function(event){

if(event.key==="Escape"){
closeImage();
}

});

</script>

</body>
</html>
