<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Portfolio</title>

<style>
#lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
cursor:pointer;
}

#lightbox img{
max-width:90vw;
max-height:90vh;
width:auto;
height:auto;
object-fit:contain;
}

body{
font-family: Arial, Helvetica, sans-serif;
margin:0;
background:white;
color:black;
}

header{
text-align:center;
padding:60px;
border-bottom:1px solid black;
}

nav{
text-align:center;
padding:20px;
border-bottom:1px solid black;
}

nav a{
margin:0 15px;
text-decoration:none;
color:black;
font-weight:bold;
}

section{
max-width:900px;
margin:auto;
padding:60px 20px;
}

h2{
border-bottom:1px solid black;
padding-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:12px;
margin-top:20px;
}

.grid img{
width:100%;
height:250px;
object-fit:cover;
cursor:pointer;
transition:0.2s;
}

.grid img:hover{
transform:scale(1.03);
}

img{
width:100%;
}

iframe{
width:100%;
height:300px;
}

footer{
text-align:center;
padding:30px;
border-top:1px solid black;
}



#lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
z-index:1000;
}

#lightbox img,
#lightbox iframe{
max-width:90vw;
max-height:90vh;
}

#lightbox iframe{
display:none;
width:80vw;
height:45vw;
}

#prev,#next{
position:absolute;
top:50%;
font-size:40px;
color:white;
cursor:pointer;
padding:20px;
user-select:none;
}

#prev{left:20px;}
#next{right:20px;}


</style>

</head>

<body>

<header>

<h1>Pedro P. Kap</h1>
<p>Portfolio</p>

</header>

<nav>

<a href="#fotografias">Fotografías</a>
<a href="#disenos">Diseños</a>
<a href="#audiovisuales">Audiovisuales</a>
<a href="#sobre">Sobre Mí</a>

</nav>

</section>

<section id="fotografias">

<h2>Fotografías</h2>

<div class="grid">

<img src="images/foto1.jpg" onclick="openImage(this)">
<img src="images/foto2.jpg" onclick="openImage(this)">
<img src="images/foto3.jpg" onclick="openImage(this)">

</div>

</section>

<section id="disenos">

<h2>Diseños</h2>

<div class="grid">

<img src="images/diseno1.jpg" onclick="openImage(this)">
<img src="images/diseno2.jpg" onclick="openImage(this)">

</div>

</section>

<section id="audiovisuales">

<h2>Audiovisuales</h2>

<div class="grid">

<iframe src="https://www.youtube.com/embed/VIDEOID"></iframe>

<iframe src="https://www.youtube.com/embed/VIDEOID"></iframe>

</div>

<section id="sobre">

<h2>Sobre Mí</h2>

<p>
Escribí aquí tu descripción: quién sos, qué hacés, formación o proyectos.
</p>

</div>

</section>

<footer>

© Pedro P. Kap

</footer>

<div id="lightbox" onclick="closeImage()">
<img id="lightbox-img">
</div>

<script>

let gallery=[];
let currentIndex=0;

document.querySelectorAll(".grid img").forEach((img,index)=>{
gallery.push(img.src);
img.dataset.index=index;
});

function openImage(img){

currentIndex=parseInt(img.dataset.index);

document.getElementById("lightbox").style.display="flex";

document.getElementById("lightbox-img").style.display="block";
document.getElementById("lightbox-video").style.display="none";

document.getElementById("lightbox-img").src=gallery[currentIndex];

}

function nextImage(){

currentIndex=(currentIndex+1)%gallery.length;

document.getElementById("lightbox-img").src=gallery[currentIndex];

}

function prevImage(){

currentIndex=(currentIndex-1+gallery.length)%gallery.length;

document.getElementById("lightbox-img").src=gallery[currentIndex];

}

document.addEventListener("keydown",function(e){

if(e.key==="Escape"){
document.getElementById("lightbox").style.display="none";
}

if(e.key==="ArrowRight"){
nextImage();
}

if(e.key==="ArrowLeft"){
prevImage();
}

});

</script>

<div id="lightbox">

<span id="prev" onclick="prevImage()">❮</span>

<img id="lightbox-img">

<iframe id="lightbox-video" frameborder="0" allowfullscreen></iframe>

<span id="next" onclick="nextImage()">❯</span>

</div>

</body>
</html>
